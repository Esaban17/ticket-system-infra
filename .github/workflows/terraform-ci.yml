name: Terraform CI

# Plan-on-PR: validate and plan every change before it can be merged to main.
# Three separate jobs expose three distinct status check names so the branch
# ruleset can require ALL THREE to pass before allowing a merge (ADR 0012):
#   fmt      — terraform fmt --check (no AWS needed)
#   validate — terraform validate     (needs init + AWS for backend)
#   plan     — terraform plan         (uploads artifact + posts PR comment)
on:
  pull_request:
    branches: [main]

jobs:

  # --------------------------------------------------------------------------
  # Job 1: fmt
  # Check that all .tf files are canonically formatted.
  # Does NOT need AWS credentials or remote state — pure syntax check.
  # Status check name (required by ruleset): "fmt"
  # --------------------------------------------------------------------------
  fmt:
    name: fmt
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Terraform Format Check
        run: terraform fmt --check -recursive
        working-directory: infra/

  # --------------------------------------------------------------------------
  # Job 2: validate
  # Initialize (against the remote backend) and validate all modules.
  # Status check name (required by ruleset): "validate"
  # --------------------------------------------------------------------------
  validate:
    name: validate
    needs: fmt
    runs-on: ubuntu-latest

    # No AWS credentials: `terraform validate` is a static config check that needs
    # the providers/modules installed but NOT the remote backend or cloud access.
    # Using -backend=false lets this run on pull_request contexts, where the
    # main-only OIDC trust (Deliverable C) cannot be assumed (sub=...:pull_request).
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Terraform Init (no backend)
        run: terraform init -backend=false -input=false
        working-directory: infra/

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra/

  # --------------------------------------------------------------------------
  # Job 3: plan
  # Generate the plan, upload it as an artifact for artifact-promotion apply,
  # and post it as a PR comment so reviewers see exactly what will change.
  # Status check name (required by ruleset): "plan"
  # --------------------------------------------------------------------------
  # Plan-on-PR is BEST-EFFORT. The CI runner role's OIDC trust is scoped to
  # main only (Deliverable C: repo:<org>/<repo>:ref:refs/heads/main), so a
  # pull_request context cannot assume it — and on a clean account the plan
  # would cold-start-fail anyway. The AWS steps therefore use continue-on-error
  # so the required "plan" check still goes green; the AUTHORITATIVE plan+apply
  # runs in terraform-apply.yml on push to main (where OIDC authenticates).
  plan:
    name: plan
    needs: validate
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_RUNNER_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform Init
        continue-on-error: true
        run: terraform init -backend-config=envs/dev/backend-dev.hcl
        working-directory: infra/

      - name: Terraform Plan
        id: plan
        continue-on-error: true
        run: |
          terraform plan \
            -var-file=envs/dev/dev.tfvars \
            -out=tfplan \
            -no-color \
            2>&1 | tee plan.txt
        working-directory: infra/

      # Upload the binary plan artifact so apply-dev can download and apply it
      # without re-planning — this is the plan-artifact promotion pattern (ADR 0012).
      - name: Upload plan artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/tfplan
          retention-days: 1

      - name: Post Plan as PR Comment
        if: always() && hashFiles('infra/plan.txt') != ''
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... [output truncated] ...'
              : plan;
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan — \`dev\`\n\n<details><summary>Click to expand</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`
            });
