name: Terraform CI

# Plan-on-PR: validate and plan every change before it can be merged to main.
# Three separate jobs expose three distinct status check names so the branch
# ruleset can require ALL THREE to pass before allowing a merge (ADR 0012):
#   fmt      — terraform fmt --check (no AWS needed)
#   validate — terraform validate     (needs init + AWS for backend)
#   plan     — terraform plan         (uploads artifact + posts PR comment)
on:
  pull_request:
    branches: [main]

jobs:

  # --------------------------------------------------------------------------
  # Job 1: fmt
  # Check that all .tf files are canonically formatted.
  # Does NOT need AWS credentials or remote state — pure syntax check.
  # Status check name (required by ruleset): "fmt"
  # --------------------------------------------------------------------------
  fmt:
    name: fmt
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Format Check
        run: terraform fmt --check -recursive
        working-directory: infra/

  # --------------------------------------------------------------------------
  # Job 2: validate
  # Initialize (against the remote backend) and validate all modules.
  # Status check name (required by ruleset): "validate"
  # --------------------------------------------------------------------------
  validate:
    name: validate
    needs: fmt
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=envs/dev/backend-dev.hcl
        working-directory: infra/

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra/

  # --------------------------------------------------------------------------
  # Job 3: plan
  # Generate the plan, upload it as an artifact for artifact-promotion apply,
  # and post it as a PR comment so reviewers see exactly what will change.
  #
  # The ScaledObject (module.keda.kubernetes_manifest.consumer_scaledobject)
  # is excluded from this plan: kubernetes_manifest validates the ScaledObject
  # CRD against the live cluster at plan time, but the CRD is installed by the
  # KEDA Helm chart which hasn’t been applied yet. Terraform 1.9’s -exclude
  # flag skips the resource from the plan; apply-dev handles it in phase 2
  # once KEDA is live (see terraform-apply.yml).
  #
  # Status check name (required by ruleset): "plan"
  # --------------------------------------------------------------------------
  plan:
    name: plan
    needs: validate
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -backend-config=envs/dev/backend-dev.hcl
        working-directory: infra/

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=envs/dev/dev.tfvars \
            -out=tfplan \
            -no-color \
            -exclude=module.keda.kubernetes_manifest.consumer_scaledobject \
            2>&1 | tee plan.txt
        working-directory: infra/

      # Upload the binary plan artifact so apply-dev can download and apply it
      # without re-planning — this is the plan-artifact promotion pattern (ADR 0012).
      # Note: the artifact does NOT include the ScaledObject (excluded above);
      # apply-dev handles it in a dedicated phase-2 step.
      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/tfplan
          retention-days: 1

      - name: Post Plan as PR Comment
        if: always() && hashFiles('infra/plan.txt') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... [output truncated] ...'
              : plan;
            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## Terraform Plan — \`dev\`\n\n<details><summary>Click to expand</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`
            });
