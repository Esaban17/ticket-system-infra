name: Terraform Apply

# Apply pipeline with plan-artifact promotion (ADR 0012):
#   plan-dev    — plan dev, upload tfplan artifact
#   apply-dev   — download tfplan, apply it verbatim (GitHub Environment: dev, auto)
#   apply-staging — plan+apply staging (GitHub Environment: staging, gated reviewer)
#
# Why plan-artifact promotion?
#   The artifact ensures apply-dev executes EXACTLY the plan reviewed in CI,
#   not a re-plan that might differ due to timing, drift, or race conditions.
#   apply-staging does a fresh plan because staging is ephemeral (cold-start
#   from zero each time; it has no pre-existing plan artifact).
on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-apply.yml"
  # Manual / bot trigger (the Slack /deploy bot — Deliverable J — calls this via
  # the workflow_dispatch REST endpoint). 'environment' selects the target env.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment to apply"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
          - staging

# Never run two applies against the same environment's remote state at once.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:

  # --------------------------------------------------------------------------
  # Job 1: plan-dev
  # Generate the dev plan and upload it as an artifact so apply-dev can
  # apply the exact plan reviewed in the PR without re-planning.
  # --------------------------------------------------------------------------
  plan-dev:
    name: Plan (dev)
    runs-on: ubuntu-latest

    # Serializa las operaciones sobre el STATE de dev con api-deploy/web-deploy
    # (mismo grupo) para no chocar en el lock de DynamoDB. A nivel job para que
    # el gate de apply-staging NO bloquee a los deploys.
    concurrency:
      group: terraform-apply-dev
      cancel-in-progress: false

    # Kill-switch: skip the entire pipeline when INFRA_AUTO_APPLY is 'false'.
    if: ${{ vars.INFRA_AUTO_APPLY != 'false' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_RUNNER_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform Init (dev)
        run: terraform init -backend-config=envs/dev/backend-dev.hcl
        working-directory: infra/

      # Cold-start safe (Deliverable F one-click): on a clean account the
      # kubernetes/helm providers can't reach a not-yet-created EKS cluster, so a
      # full plan fails. apply-dev no longer consumes this plan (it runs a
      # two-phase apply), so a cold-start plan failure here must NOT block the
      # pipeline — this step is a warm-state preview only.
      - name: Terraform Plan (dev)
        continue-on-error: true
        run: |
          terraform plan \
            -var-file=envs/dev/dev.tfvars \
            -out=tfplan \
            -no-color
        working-directory: infra/

      - name: Upload plan artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev-${{ github.run_id }}
          path: infra/tfplan
          retention-days: 1

      # data.archive_file.lambda creates the Lambda ZIP during terraform plan
      # (data sources are evaluated at plan time). The apply runner is a fresh
      # machine with no build/ directory, so we ship the ZIP as a second
      # artifact that apply-dev downloads before running terraform apply.
      - name: Upload Lambda package artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: lambda-build-${{ github.run_id }}
          path: infra/modules/compute/build/
          retention-days: 1

  # --------------------------------------------------------------------------
  # Job 2: apply-dev (two-phase, cold-start capable — Deliverable F one-click)
  # Phase 1 creates the AWS infra (incl. EKS) so the Kubernetes/Helm providers
  # have a reachable cluster; -target pulls each module's deps (iam, kms,
  # secrets, network) transitively. Phase 2 applies the in-cluster stack. On a
  # clean account this brings up all components from a single push; on warm
  # state both phases are near no-ops plus any diff. Inline plan+apply rebuilds
  # the Lambda ZIP in-session, so no plan/lambda artifact is consumed.
  # --------------------------------------------------------------------------
  apply-dev:
    name: Apply (dev)
    needs: plan-dev
    runs-on: ubuntu-latest
    environment: dev

    # Mismo grupo que plan-dev y los *-deploy: serializa el apply al state de dev.
    concurrency:
      group: terraform-apply-dev
      cancel-in-progress: false

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_RUNNER_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform Init (dev)
        run: terraform init -backend-config=envs/dev/backend-dev.hcl
        working-directory: infra/

      # Phase 1: create AWS infra (network → EKS, SQS, scheduler) before the
      # Kubernetes/Helm providers try to connect to a cluster that doesn't exist
      # yet on a clean account. -target pulls in each module's dependencies
      # (iam, kms, secrets, network) transitively.
      - name: Apply infrastructure (network → eks, async, scheduler)
        run: |
          terraform apply -auto-approve \
            -var-file=envs/dev/dev.tfvars \
            -target=module.network \
            -target=module.security \
            -target=module.storage \
            -target=module.registry \
            -target=module.registry_web \
            -target=module.compute \
            -target=module.database \
            -target=module.eks \
            -target=module.async \
            -target=module.scheduler
        working-directory: infra/

      # Phase 2: apply everything else (iam, kms, secrets, observability,
      # alb_controller, ingress, keda, container_insights) now that the cluster
      # endpoint is live.
      - name: Apply full stack (in-cluster + observability)
        run: |
          terraform apply -auto-approve \
            -var-file=envs/dev/dev.tfvars
        working-directory: infra/

  # --------------------------------------------------------------------------
  # Job 3: apply-staging
  # Plan + apply the staging environment from scratch. Uses the GitHub
  # Environment "staging" which requires a manual approval from the designated
  # reviewer before proceeding (ADR 0012). Runs only after apply-dev succeeds.
  #
  # Two-phase apply because staging is a cold-start: the EKS cluster doesn't
  # exist yet, so the Kubernetes/Helm provider can't connect during a full
  # plan. Phase 1 creates the AWS infra (incl. EKS); Phase 2 creates the
  # in-cluster resources once the cluster endpoint is reachable.
  #
  # No Lambda ZIP artifact needed for staging: the two-phase apply runs plan
  # and apply in the same runner session, so archive_file creates the ZIP
  # during the inline plan and aws_lambda_function reads it in the same apply.
  # --------------------------------------------------------------------------
  apply-staging:
    name: Apply (staging)
    needs: apply-dev
    runs-on: ubuntu-latest
    environment: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_RUNNER_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Terraform Init (staging)
        run: terraform init -backend-config=envs/staging/backend-staging.hcl
        working-directory: infra/

      # Phase 1: create AWS infra (network → EKS, SQS, scheduler) before the
      # Kubernetes/Helm provider tries to connect to a cluster that doesn't
      # exist yet (cold-start chicken-egg, same as dev's first apply in D3).
      - name: Apply infrastructure (network → eks, async, scheduler)
        run: |
          terraform apply -auto-approve \
            -var-file=envs/staging/staging.tfvars \
            -target=module.network \
            -target=module.security \
            -target=module.storage \
            -target=module.registry \
            -target=module.registry_web \
            -target=module.compute \
            -target=module.database \
            -target=module.eks \
            -target=module.async \
            -target=module.scheduler
        working-directory: infra/

      # Phase 2: apply everything else now that the cluster endpoint is live.
      - name: Apply full stack (alb_controller, ingress, keda)
        run: |
          terraform apply -auto-approve \
            -var-file=envs/staging/staging.tfvars
        working-directory: infra/
