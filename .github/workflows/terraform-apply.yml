name: Terraform Apply

# Apply pipeline with plan-artifact promotion (ADR 0012):
#   plan-dev    — plan dev (excluding ScaledObject; see note below), upload tfplan artifact
#   apply-dev   — phase 1: download tfplan, apply it verbatim (GitHub Environment: dev, auto)
#                 phase 2: apply ScaledObject with -target once KEDA CRDs are available
#   apply-staging — three-phase cold-start apply (GitHub Environment: staging, gated reviewer)
#
# ScaledObject exclusion:
#   kubernetes_manifest validates CRDs at plan time. Since KEDA’s Helm chart
#   (which installs the keda.sh CRDs) hasn’t run yet when the plan executes,
#   the plan fails with "API did not recognize GroupVersionKind". The -exclude
#   flag (Terraform ≥ 1.9) removes the ScaledObject from the plan artifact;
#   apply-dev’s phase-2 step applies it after KEDA is live.
on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/terraform-apply.yml"

# Never run two applies against the same environment's remote state at once.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:

  # --------------------------------------------------------------------------
  # Job 1: plan-dev
  # Generate the dev plan and upload it as an artifact so apply-dev can
  # apply the exact plan reviewed in the PR without re-planning.
  # The ScaledObject is excluded (see header comment).
  # --------------------------------------------------------------------------
  plan-dev:
    name: Plan (dev)
    runs-on: ubuntu-latest

    # Kill-switch: skip the entire pipeline when INFRA_AUTO_APPLY is 'false'.
    if: ${{ vars.INFRA_AUTO_APPLY != 'false' }}

    permissions:
      contents: read

    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init (dev)
        run: terraform init -backend-config=envs/dev/backend-dev.hcl
        working-directory: infra/

      - name: Terraform Plan (dev)
        run: |
          terraform plan \
            -var-file=envs/dev/dev.tfvars \
            -out=tfplan \
            -no-color \
            -exclude=module.keda.kubernetes_manifest.consumer_scaledobject
        working-directory: infra/

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev-${{ github.run_id }}
          path: infra/tfplan
          retention-days: 1

  # --------------------------------------------------------------------------
  # Job 2: apply-dev
  # Phase 1: download the tfplan artifact and apply it without re-planning.
  #   terraform apply <planfile> applies exactly the reviewed plan, including
  #   the KEDA Helm release which installs the keda.sh CRDs.
  # Phase 2: apply only the ScaledObject, now that the CRDs are available.
  #   -target limits the second apply to a single resource so it doesn't
  #   re-plan the entire stack.
  # --------------------------------------------------------------------------
  apply-dev:
    name: Apply (dev)
    needs: plan-dev
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      contents: read

    env:
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init (dev)
        run: terraform init -backend-config=envs/dev/backend-dev.hcl
        working-directory: infra/

      # Download the exact binary plan produced by plan-dev — no re-plan.
      # The plan file encodes the full dependency graph; Terraform applies
      # resources in the correct order (EKS before in-cluster resources).
      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev-${{ github.run_id }}
          path: infra/

      - name: Apply plan (dev) — phase 1 (all resources except ScaledObject)
        run: terraform apply tfplan
        working-directory: infra/

      # Phase 2: the KEDA Helm chart (applied in phase 1) has now installed
      # the keda.sh CRDs. Apply the ScaledObject with -target so Terraform
      # only plans and applies this single resource without re-diffing the
      # entire stack.
      - name: Apply ScaledObject (dev) — phase 2 (KEDA CRDs now available)
        run: |
          terraform apply -auto-approve \
            -var-file=envs/dev/dev.tfvars \
            -target=module.keda.kubernetes_manifest.consumer_scaledobject
        working-directory: infra/

  # --------------------------------------------------------------------------
  # Job 3: apply-staging
  # Three-phase cold-start apply for staging (no pre-existing cluster).
  # Requires manual approval from the reviewer configured in the GitHub
  # Environment "staging" (ADR 0012). Runs only after apply-dev succeeds.
  #
  # Phase 1 — AWS infra: network → EKS, SQS, scheduler (no K8s resources).
  # Phase 2a — ALB controller + KEDA Helm: installs Helm charts and CRDs.
  # Phase 2b — Full stack: in-cluster resources (ingress, ScaledObject, etc.)
  #             now that the cluster is reachable and CRDs are available.
  # --------------------------------------------------------------------------
  apply-staging:
    name: Apply (staging)
    needs: apply-dev
    runs-on: ubuntu-latest
    environment: staging

    permissions:
      contents: read

    env:
      # Staging uses a separate secret scoped to the GitHub Environment.
      TF_VAR_db_password: ${{ secrets.STAGING_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.9"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Terraform Init (staging)
        run: terraform init -backend-config=envs/staging/backend-staging.hcl
        working-directory: infra/

      # Phase 1: create AWS infra (network → EKS, SQS, scheduler) before the
      # Kubernetes/Helm provider tries to connect to a cluster that doesn’t
      # exist yet (cold-start chicken-egg, same as dev’s first apply in D3).
      - name: Apply infrastructure (phase 1 — network → eks, async, scheduler)
        run: |
          terraform apply -auto-approve \
            -var-file=envs/staging/staging.tfvars \
            -target=module.network \
            -target=module.security \
            -target=module.storage \
            -target=module.registry \
            -target=module.registry_web \
            -target=module.compute \
            -target=module.database \
            -target=module.eks \
            -target=module.async \
            -target=module.scheduler
        working-directory: infra/

      # Phase 2a: install ALB controller + KEDA Helm release.
      # The Helm charts install the keda.sh CRDs needed by the ScaledObject
      # resource in phase 2b. Without this intermediate step a full apply
      # would fail: kubernetes_manifest validates CRDs at plan time, and the
      # CRDs don’t exist until the Helm chart runs.
      - name: Apply Helm charts (phase 2a — alb_controller + keda helm)
        run: |
          terraform apply -auto-approve \
            -var-file=envs/staging/staging.tfvars \
            -target=module.alb_controller \
            -target=module.keda.aws_iam_policy.keda_sqs \
            -target=module.keda.module.keda_irsa \
            -target=module.keda.helm_release.keda
        working-directory: infra/

      # Phase 2b: apply the full stack now that the cluster endpoint is live
      # and the keda.sh CRDs are installed. This creates the ingress resources,
      # the consumer Deployment/SA/IRSA, and the ScaledObject.
      - name: Apply full stack (phase 2b — ingress, consumer, ScaledObject)
        run: |
          terraform apply -auto-approve \
            -var-file=envs/staging/staging.tfvars
        working-directory: infra/
