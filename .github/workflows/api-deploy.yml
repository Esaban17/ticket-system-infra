name: API Deploy

# BL-138 (EP-19) — CD de la imagen de la API.
#
# En cada push a main que toque app/api/**:
#   1. build de la imagen Docker (linux/amd64) desde app/api/Dockerfile,
#   2. push a ECR etiquetada con el short git SHA (tags inmutables: cada SHA
#      produce un tag único, no se reescribe ":latest"),
#   3. rollout: terraform apply con -target acotado a los 4 resources del API
#      (db_seed, deployment, service, ingress) y -var api_image_tag=<sha>.
#      El target acotado evita resetear kubernetes_deployment.web a la imagen
#      por defecto (bootstrap, inexistente en ECR) que causaría ImagePullBackOff.
#
# Auth a AWS con el mismo patrón de secrets que terraform-apply.yml
# (AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_REGION). El password de la
# DB llega por TF_VAR_db_password y nunca se commitea (rúbrica).
#
# Rollback: re-disparar este workflow apuntando a un SHA previo, o aplicar a
# mano `terraform apply -target=module.ingress -var api_image_tag=<sha-anterior>`
# en infra/ (las imágenes viejas se conservan según el lifecycle policy de ECR).
on:
  push:
    branches: [main]
    paths:
      - "app/api/**"
      - ".github/workflows/api-deploy.yml"
  workflow_dispatch:

# Comparte el grupo de concurrencia con terraform-apply.yml: ambos workflows
# operan sobre el MISMO remote state, así que nunca deben correr a la vez.
concurrency:
  group: terraform-apply-dev
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build, push & rollout (dev)
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      # Valor sensible inyectado como TF_VAR_* — nunca se commitea (rúbrica).
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Short git SHA (7 chars) reutilizado como tag de imagen y como
      # api_image_tag en el apply. Se expone como output del step.
      - name: Compute image tag (short SHA)
        id: meta
        run: echo "tag=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Deriva la URL del repo ECR sin hardcodear el account ID: el repo se
      # llama "<project>-api" (ticket-system-api, ver infra/main.tf). El
      # repositoryUri ya trae el registry <accountId>.dkr.ecr.<region>...
      - name: Resolve ECR repository URL
        id: ecr
        run: |
          repo_url=$(aws ecr describe-repositories \
            --repository-names ticket-system-api \
            --query 'repositories[0].repositoryUri' \
            --output text)
          echo "repository=${repo_url}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build linux/amd64 (los nodos EKS son x86_64) y push del tag = short SHA.
      # El context es app/api/ — ahí viven el Dockerfile y el código.
      - name: Build & push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: app/api
          file: app/api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ecr.outputs.repository }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Terraform Init
        run: terraform init
        working-directory: infra/

      # Rollout: solo los resources del API dentro de module.ingress.
      # Se targetean los 4 resources del API (db_seed, deployment, service,
      # ingress) sin incluir kubernetes_deployment.web ni kubernetes_service.web.
      # El cierre de dependencias de estos targets trae automáticamente: namespace,
      # ServiceAccount (IRSA), ConfigMap, Secret y random_password.jwt — todo lo
      # que el cluster nuevo necesita y que no se había aplicado desde la recreación
      # del 2026-06-16 (api-deploy nunca corrió desde entonces; ECR = 0 imágenes).
      #
      # Por qué NO -target=module.ingress (full): dev.tfvars no pinea web_image_tag
      # → default "bootstrap" (inexistente en ECR) → ImagePullBackOff en el web.
      # El enfoque quirúrgico protege la imagen del web actual (85056ae).
      - name: Rollout API (db_seed + deployment + service + ingress routing)
        run: |
          terraform apply -auto-approve \
            -var-file=envs/dev/dev.tfvars \
            -var "api_image_tag=${{ steps.meta.outputs.tag }}" \
            -target=module.ingress.kubernetes_job.db_seed \
            -target=module.ingress.kubernetes_deployment.app \
            -target=module.ingress.kubernetes_service.app \
            -target=module.ingress.kubernetes_ingress_v1.app
        working-directory: infra/
