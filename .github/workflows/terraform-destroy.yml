name: Terraform Destroy

# Manual teardown of a specific environment. Runs from GitHub's network so
# terraform destroy can reach the EKS API endpoint and remove the Kubernetes
# Ingress first (allowing the ALB Controller to delete the ALB cleanly) before
# destroying the cluster and AWS resources. A local destroy may fail if the
# EKS endpoint is firewalled.
#
# Requires two inputs:
#   environment — which stack to destroy (dev or staging)
#   confirm     — must type "destroy" exactly to proceed (safety gate)
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - staging
      confirm:
        description: 'Type "destroy" to confirm teardown of the selected environment'
        required: true
        default: ""

# Share the apply concurrency group so a destroy never overlaps an apply.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  destroy:
    name: Destroy (${{ github.event.inputs.environment }})
    # Safety gate: only run when the operator typed exactly "destroy".
    if: ${{ github.event.inputs.confirm == 'destroy' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_RUNNER_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Confirm target environment
        run: echo "Destroying environment=${{ github.event.inputs.environment }}"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config=envs/${{ github.event.inputs.environment }}/backend-${{ github.event.inputs.environment }}.hcl
        working-directory: infra/

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var-file=envs/${{ github.event.inputs.environment }}/${{ github.event.inputs.environment }}.tfvars
        working-directory: infra/
