name: Web Deploy

# CD de la imagen del frontend (SPA Vite/React).
#
# En cada push a main que toque app/web/**:
#   1. Build de la imagen Docker multi-stage (node:20-slim → nginx-unprivileged).
#      VITE_API_URL="" → llamadas relativas /v1/... → same-origin con el ALB.
#   2. Push a ECR (ticket-system-web) etiquetada con el short git SHA.
#   3. Rollout: terraform apply -target=module.ingress -var web_image_tag=<sha>,
#      que actualiza el kubernetes_deployment.web en EKS.
#
# Comparte el grupo de concurrencia terraform-apply-dev con api-deploy.yml y
# terraform-apply.yml: todos operan sobre el mismo remote state → nunca corren
# a la vez (cancel-in-progress: false → se encolan en orden).
on:
  push:
    branches: [main]
    paths:
      - "app/web/**"
      - ".github/workflows/web-deploy.yml"

concurrency:
  group: terraform-apply-dev
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build, push & rollout web (dev)
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Short SHA de 7 chars → tag inmutable (ECR IMMUTABLE), único por commit.
      - name: Compute image tag (short SHA)
        id: meta
        run: echo "tag=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.CI_RUNNER_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # Terraform se inicializa ANTES de resolver la URL del ECR para poder
      # garantizar que el repositorio exista. Si terraform-apply.yml aún no
      # corrió (p. ej. primer merge que toca infra y app/web a la vez), este
      # paso crea module.registry_web y evita el RepositoryNotFoundException.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Terraform Init
        run: terraform init -backend-config=envs/dev/backend-dev.hcl
        working-directory: infra/

      # Garantiza que el repositorio ECR ticket-system-web exista antes de
      # hacer el describe. Si ya existe, Terraform no hace nada (idempotente).
      - name: Ensure ECR web repository exists
        run: |
          terraform apply -auto-approve \
            -var-file=envs/dev/dev.tfvars \
            -target=module.registry_web
        working-directory: infra/

      # Deriva la URL del repo ECR sin hardcodear el account ID.
      - name: Resolve ECR repository URL
        id: ecr
        run: |
          repo_url=$(aws ecr describe-repositories \
            --repository-names ticket-system-web \
            --query 'repositories[0].repositoryUri' \
            --output text)
          echo "repository=${repo_url}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build linux/amd64 (nodos EKS son x86_64).
      # VITE_API_URL="" → el bundle llama /v1/... relativo → mismo origen.
      - name: Build & push image to ECR
        uses: docker/build-push-action@v6
        with:
          context: app/web
          file: app/web/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.ecr.outputs.repository }}:${{ steps.meta.outputs.tag }}
          build-args: |
            VITE_API_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Rollout: aplica el Deployment del web + el Service + el Ingress (rutas).
      # - kubernetes_deployment.web: actualiza la imagen a web_image_tag=<sha>.
      # - kubernetes_service.web: crea el ClusterIP si no existe (idempotente).
      # - kubernetes_ingress_v1.app: aplica las 4 rutas del ALB
      #     /v1, /healthz, /readyz → API ; / → web
      #   Si el Service web faltaba, el Ingress no podía crear el TG correcto.
      # Ninguno de estos resources referencia api_image_tag ni kubernetes_job.db_seed,
      # por lo que el plan no toca el Deployment del API ni recrea el seed Job.
      - name: Rollout web (deployment + service + ingress routing)
        run: |
          terraform apply -auto-approve \
            -var-file=envs/dev/dev.tfvars \
            -var "web_image_tag=${{ steps.meta.outputs.tag }}" \
            -target=module.ingress.kubernetes_deployment.web \
            -target=module.ingress.kubernetes_service.web \
            -target=module.ingress.kubernetes_ingress_v1.app
        working-directory: infra/
