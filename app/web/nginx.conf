# Bloque server para la SPA del sistema de tickets.
# Se copia a /etc/nginx/conf.d/default.conf en la imagen runtime.
# nginxinc/nginx-unprivileged incluye el nginx.conf principal que hace
# `include /etc/nginx/conf.d/*.conf`, por lo que este archivo es suficiente.
server {
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Health check para el target group del ALB (sin logs para evitar ruido).
    # Mismo path que el API (/healthz) → el Ingress puede reusar la misma
    # anotación healthcheck-path sin configuración por servicio.
    location = /healthz {
        access_log  off;
        add_header  Content-Type text/plain;
        return      200 'ok';
    }

    # SPA fallback: si el archivo o directorio no existe, sirve index.html
    # para que React Router maneje el routing en el cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
