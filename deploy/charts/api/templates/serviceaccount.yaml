{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "api.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
  annotations:
    {{- /* IRSA: vincula el SA con el rol IAM (BL-104). Solo se emite si hay ARN. */ -}}
    {{- if .Values.serviceAccount.roleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
# Los tokens proyectados de IRSA se montan automáticamente; no se desactiva.
automountServiceAccountToken: true
{{- end }}
