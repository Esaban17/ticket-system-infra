# =============================================================================
# Overrides para el entorno de desarrollo (dev).
# Uso: helm upgrade --install api ./deploy/charts/api -f values-dev.yaml
# =============================================================================

# 1 réplica en dev para abaratar costos.
replicaCount: 1

image:
  pullPolicy: IfNotPresent
  tag: "1.0.0"

serviceAccount:
  create: true
  name: api-sa
  # Sustituir por el ARN real que emite el módulo IRSA (terraform output).
  roleArn: ""

config:
  configMapName: ticket-system-config
  secretName: ticket-system-secrets

# Recursos más austeros en dev.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Autoscaling activo pero con techo bajo; en dev casi siempre 1 pod.
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70

# En dev permitir quedarse en 0 disponibles durante drains acelera el ciclo.
podDisruptionBudget:
  enabled: false
